name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build

      - name: Smoke test installed wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -m noteropdf --help

  bundle-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bundle dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Build standalone bundle
        run: pyinstaller --noconfirm --clean --specpath build/pyinstaller --name noteropdf --onedir --collect-submodules keyring.backends noteropdf/__main__.py

      - name: Smoke test standalone bundle
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./dist/noteropdf/noteropdf.exe --help
          else
            ./dist/noteropdf/noteropdf --help
          fi

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: noteropdf-${{ matrix.os }}
          path: dist/noteropdf
